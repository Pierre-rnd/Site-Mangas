<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription — MangaList</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="form-container">
        <h2>Créer un compte</h2>
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username"
                   value="{{ username or '' }}" required autocomplete="username" placeholder="Ton pseudo">

            <label for="email">Email</label>
            <input type="email" id="email" name="email"
                   value="{{ email or '' }}" required autocomplete="email" placeholder="toi@exemple.com">

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password"
                   required autocomplete="new-password" placeholder="••••••••">

            <button type="submit" style="margin-top: 1.25rem; width: 100%;">Créer mon compte</button>
        </form>
        <p>Déjà un compte ? <a href="{{ url_for('login') }}">Se connecter</a></p>
    </div>
</body>
</html>
